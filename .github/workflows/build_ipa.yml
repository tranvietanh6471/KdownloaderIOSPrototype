name: Build Kdownloader .ipa (Unsigned)

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build_ipa.yml"
      - "Frameworks/**"
      - "Palladium/**"
      - "Palladium.xcodeproj/project.pbxproj"
      - "build_ipa.sh"
      - "scripts/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Download Python Apple Support
      uses: robinraju/release-downloader@v1
      with:
        repository: beeware/Python-Apple-support
        latest: true
        fileName: "*iOS-support*.tar.gz"
        out-file-path: python-download
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Python Apple Support
      run: |
        set -euo pipefail

        TMP_DIR=$(mktemp -d)
        FRAMEWORKS_DIR="$GITHUB_WORKSPACE/Frameworks"
        ARCHIVE_PATH=$(find "$GITHUB_WORKSPACE/python-download" -maxdepth 1 -type f -name "*iOS-support*.tar.gz" | head -n 1)

        if [ -z "$ARCHIVE_PATH" ]; then
          echo "❌ Could not find downloaded iOS support archive."
          find "$GITHUB_WORKSPACE/python-download" -maxdepth 2 -print
          exit 1
        fi

        EXTRACT_DIR="$TMP_DIR/extracted"
        mkdir -p "$EXTRACT_DIR"
        tar -xzf "$ARCHIVE_PATH" -C "$EXTRACT_DIR"

        XCFRAMEWORK_PATH=$(find "$EXTRACT_DIR" -type d -name "Python.xcframework" | head -n 1)
        if [ -z "$XCFRAMEWORK_PATH" ]; then
          echo "❌ Python.xcframework not found in extracted archive."
          find "$EXTRACT_DIR" -maxdepth 3 -type d
          exit 1
        fi

        mkdir -p "$FRAMEWORKS_DIR"
        rm -rf "$FRAMEWORKS_DIR/Python.xcframework"
        cp -R "$XCFRAMEWORK_PATH" "$FRAMEWORKS_DIR/Python.xcframework"

        echo "✅ Installed Python.xcframework:"
        ls -la "$FRAMEWORKS_DIR/Python.xcframework"

    - name: Download SwiftFFmpeg-iOS
      uses: robinraju/release-downloader@v1
      with:
        repository: tfourj/SwiftFFmpeg-iOS
        latest: true
        fileName: SwiftFFmpeg-iOS.zip
        out-file-path: swiftffmpeg-download
        extract: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install SwiftFFmpeg-iOS
      run: |
        set -euo pipefail

        TMP_DIR=$(mktemp -d)
        FRAMEWORKS_DIR="$GITHUB_WORKSPACE/Frameworks"
        TARGET_DIR="$FRAMEWORKS_DIR/SwiftFFmpeg-iOS"
        EXTRACT_DIR="$TMP_DIR/extracted"
        mkdir -p "$FRAMEWORKS_DIR"
        mkdir -p "$EXTRACT_DIR"
        cp -R "$GITHUB_WORKSPACE/swiftffmpeg-download/." "$EXTRACT_DIR"

        SOURCE_DIR=""
        if [ -d "$EXTRACT_DIR/SwiftFFmpeg-iOS" ]; then
          SOURCE_DIR="$EXTRACT_DIR/SwiftFFmpeg-iOS"
        else
          SOURCE_DIR=$(find "$EXTRACT_DIR" -maxdepth 2 -type f -name "Package.swift" -exec dirname {} \; | head -n 1)
        fi

        if [ -z "$SOURCE_DIR" ] || [ ! -d "$SOURCE_DIR" ]; then
          echo "❌ Could not locate extracted SwiftFFmpeg-iOS folder."
          find "$EXTRACT_DIR" -maxdepth 3 -print
          exit 1
        fi

        rm -rf "$TARGET_DIR"
        cp -R "$SOURCE_DIR" "$TARGET_DIR"

        echo "✅ Installed SwiftFFmpeg-iOS:"
        ls -la "$TARGET_DIR"

    - name: Set up Xcode 26.2
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26.2"

    - name: Show Xcode Version
      run: xcodebuild -version

    - name: Show Swift Version
      run: swift --version

    - name: Make script executable
      run: chmod +x build_ipa.sh

    - name: Build IPA
      env:
        PALLADIUM_DISABLE_PYTHON_DYLIB_CODESIGN: "1"
      run: ./build_ipa.sh

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kdownloader
        path: build/*.ipa
